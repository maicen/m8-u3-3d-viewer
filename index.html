<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic GLB, SPZ & PLY Viewer</title>

    <!-- Import map for Three.js and GaussianSplats3D -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/",
                "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d/build/gaussian-splats-3d.module.js"
            }
        }
    </script>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="top-bar">
        <label for="model-select"><strong>Select a Model:</strong></label>
        <select id="model-select"></select>
        <div style="margin-right: auto; font-size: 14px; color: #555;">
            Supported formats: <strong>GLB</strong>, <strong>SPZ</strong>, <strong>PLY</strong></div>
        <div style="margin-left: auto; font-size: 14px; color: #555;">
            Full-Screen 3D Model Viewer - Group 5 - MAICEN - 1125 - <a
                href="https://github.com/maicen/m8-u3-3d-viewer">Assignment M8U3</a></div>
    </div>

    <div class="viewer-container">
        <!-- The GLB Viewer -->
        <div id="glb-container"></div>

        <!-- The Splat Viewer Container (for SPZ & PLY) -->
        <div id="splat-container"></div>
    </div>

    <script type="module" src="./app.js"></script>

</body>

</html>
